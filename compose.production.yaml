name: nisit-deeden-backend

services:
  app:
    build: .
    container_name: laravel_app
    working_dir: /var/www
    volumes:
      - .:/var/www
    networks:
      - sail

  nginx:
    image: nginx:alpine
    container_name: laravel_nginx
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - .:/var/www
      - ./docker/nginx:/etc/nginx/conf.d
    depends_on:
      - app
    networks:
      - sail

networks:
  sail:
    external: true
