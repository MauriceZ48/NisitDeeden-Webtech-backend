name: nisit-deeden-backend

services:
  app:
    build: .
    container_name: laravel_app
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/http.d/default.conf

    ports:
      - "${APP_PORT:-80}:80"
    networks:
      - sail

networks:
  sail:
    external: true
