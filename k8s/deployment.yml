apiVersion: apps/v1
kind: Deployment
metadata:
  name: nisit-deeden-laravel
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nisit-deeden-laravel
  template:
    metadata:
      labels:
        app: nisit-deeden-laravel
    spec:
      containers:
        - name: app
          image: ${DOCKER_USERNAME}/nisit-deeden-laravel:latest
          envFrom:
            - secretRef:
                name: laravel-env
          ports:
            - containerPort: 9000
          imagePullPolicy: Always

        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80

          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d

      volumes:
        - name: nginx-config
          configMap:
            name: nginx-config
