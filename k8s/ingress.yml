apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nisit-deeden-combined-ingress
  # annotations:
  #   nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: api.nisit-deeden.k8s.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nisit-deeden-backend
                port:
                  number: 80

    - host: user.nisit-deeden.k8s.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nisit-deeden-frontend
                port:
                  number: 80
