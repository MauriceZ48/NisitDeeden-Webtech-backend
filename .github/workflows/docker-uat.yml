name: Docker Image UAT
on:
  push:
    branches: ["uat"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: uat
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build and push Docker image with BuildX
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/prod.Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/nisit-deeden-laravel-uat:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
  deploy:
    needs: build-and-push
    runs-on: self-hosted # self-hosted runner in your machine
    environment: production

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: show kube context
        run: |
          kubectl config current-context
          kubectl get nodes

      - name: Setup env
        run: |
          echo "${{ secrets.LARAVEL_ENV }}" > .env

      - name: Create k8s secret
        run: |
          kubectl create secret generic laravel-env-uat \
            --from-env-file=.env \
            --namespace=default \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy to Kubernetes
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
        shell: bash
        run: |
          envsubst < k8s/uat-deployment.yml | kubectl apply -f -
          kubectl apply -f k8s/uat-service.yml
          kubectl apply -f k8s/uat-ingress.yml

          kubectl rollout restart deployment/nisit-deeden-laravel-uat
          kubectl rollout status deployment/nisit-deeden-laravel-uat

      - name: Cleanup env
        run: rm -f .env
